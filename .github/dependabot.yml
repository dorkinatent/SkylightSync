version: 2
updates:
  # Keep GitHub Actions pinned versions current (security patches for CI).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep Python dependencies current.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
