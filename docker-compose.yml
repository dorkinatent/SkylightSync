version: '3.8'

services:
  skylight-sync:
    build: .
    container_name: skylight-sync
    restart: unless-stopped
    environment:
      # iCloud Album Configuration (set in .env)
      - ICLOUD_ALBUM_URL=${ICLOUD_ALBUM_URL}
      - RECIPIENT_EMAIL=${RECIPIENT_EMAIL}
      
      # Email Configuration
      - SMTP_SERVER=smtp.gmail.com
      - SMTP_PORT=587
      - SENDER_EMAIL=${SENDER_EMAIL}
      - SENDER_PASSWORD=${SENDER_PASSWORD}
      
      # Optional: Override check interval (in seconds)
      # - CHECK_INTERVAL=3600
    
    volumes:
      # Persist processed photos tracking
      - ./data:/app/data
      # Optional: Mount downloads directory if you want to keep photos
      # - ./downloads:/app/downloads
    
    # Run with custom arguments
    # command: python skylight_sync.py --interval 1800 --batch-size 10
    
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f skylight_sync || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # For debugging, uncomment to keep container running
    # command: tail -f /dev/null